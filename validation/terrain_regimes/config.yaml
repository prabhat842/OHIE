solver:
  dt_max_s: 5.0
  manning_n: 0.055
  slope_cap: 0.05
  rainfall_mm_hr: 25.0
  duration_s: 1800
  sample_every_s: 300
  coefficient: 1.0e-6

analysis:
  flooded_threshold_m: 0.02
  classification:
    strong_transfer:
      max_mass_error: 0.01
      min_edge_response_m: 0.01
    moderate_transfer:
      max_mass_error: 0.05
      min_edge_response_m: 0.0
